<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Romantic Moonlit Garden | Arpita's Birthday</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Dancing Script', cursive;
        }

        /* romantic message overlay with soft glow */
        .romantic-message {
            position: absolute;
            bottom: 10%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            animation: fadeInLove 1.4s ease-out;
        }

        .love-card {
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(15px);
            display: inline-block;
            padding: 1rem 2.5rem;
            border-radius: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 2px rgba(255, 160, 200, 0.9), 0 0 40px rgba(255, 80, 120, 0.6);
            border: 1px solid #ff99cc;
        }

        .love-card h1 {
            font-size: 2.8rem;
            margin: 0;
            font-weight: 600;
            color: #fff0f5;
            letter-spacing: 2px;
        }

        .romantic-name {
            font-size: 3.6rem;
            display: inline-block;
            background: linear-gradient(135deg, #FFE484, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #FFAA66, 0 0 35px #FF5588;
            animation: heartbeatGlow 1s ease-in-out infinite alternate;
            font-weight: 800;
            margin: 0 0.1em;
        }

        .love-card p {
            font-size: 1.2rem;
            margin: 0.5rem 0 0;
            color: #FFD9E6;
            font-weight: 500;
        }

        .love-sub {
            font-size: 0.95rem;
            margin-top: 0.5rem;
            color: #FFB7D2;
        }

        @keyframes fadeInLove {
            from { opacity: 0; transform: translateY(60px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeatGlow {
            0% { text-shadow: 0 0 8px #FFAA66, 0 0 12px #FF6688; transform: scale(1); }
            100% { text-shadow: 0 0 28px #FFCC88, 0 0 50px #FF5588; transform: scale(1.02); }
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: #ffccdd;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-family: monospace;
            backdrop-filter: blur(4px);
            pointer-events: none;
            z-index: 20;
        }

        @media (max-width: 700px) {
            .love-card h1 { font-size: 1.5rem; }
            .romantic-name { font-size: 2rem; }
            .love-card p { font-size: 0.8rem; }
            .love-card { padding: 0.6rem 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="romantic-message">
        <div class="love-card">
            <h1>💖 Forever Yours, <span class="romantic-name">Arpita</span> 💖</h1>
            <p>🌹 Every rose whispers your name | Every star shines for you 🌹</p>
            <div class="love-sub">✨ My heart beats only for you, today and always ✨</div>
        </div>
    </div>
    <div class="instruction">💕 Drag to explore | Scroll to zoom | A garden of eternal love</div>

    <!-- Import Three.js and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup romantic moonlit scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0515); // deep romantic night
        scene.fog = new THREE.FogExp2(0x0a0515, 0.006);

        // --- camera ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5.5, 3.5, 7.5);
        camera.lookAt(0, 1.2, 0);

        // --- renderers ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2D for floating affectionate messages
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.0;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 1.4, 0);

        // --- Romantic Lighting: moon + warm candle glow ---
        const ambientLight = new THREE.AmbientLight(0x332233, 0.5);
        scene.add(ambientLight);
        
        // moonlight (directional)
        const moonLight = new THREE.DirectionalLight(0xccaaee, 0.85);
        moonLight.position.set(3, 8, 2);
        moonLight.castShadow = true;
        moonLight.shadow.mapSize.width = 1024;
        moonLight.shadow.mapSize.height = 1024;
        scene.add(moonLight);
        
        // warm candle fill
        const candleFill = new THREE.PointLight(0xffaa77, 0.6);
        candleFill.position.set(0, -0.3, 1.2);
        scene.add(candleFill);
        
        // back rim light (pink)
        const rimLove = new THREE.PointLight(0xff88aa, 0.7);
        rimLove.position.set(-2, 2.2, -4);
        scene.add(rimLove);
        
        // floating candle lights (romantic)
        const candleLights = [];
        for (let i = 0; i < 20; i++) {
            const color = i % 2 === 0 ? 0xff6688 : 0xffaa77;
            const light = new THREE.PointLight(color, 0.45);
            light.userData = { angle: Math.random() * Math.PI * 2, radius: 2.0 + Math.random() * 3.0, speed: 0.004 + Math.random() * 0.01, yOff: 0.6 + Math.random() * 2.0 };
            scene.add(light);
            candleLights.push(light);
        }
        
        // --- Ground: soft rose petal carpet ---
        const groundDisc = new THREE.Mesh(
            new THREE.CircleGeometry(7, 32),
            new THREE.MeshStandardMaterial({ color: 0x3d1a2c, roughness: 0.7, metalness: 0.1, transparent: true, opacity: 0.6 })
        );
        groundDisc.rotation.x = -Math.PI / 2;
        groundDisc.position.y = -0.55;
        groundDisc.receiveShadow = true;
        scene.add(groundDisc);
        
        // scattered rose petals (many tiny planes)
        const petalMat = new THREE.MeshStandardMaterial({ color: 0xff6688 });
        for (let i = 0; i < 1200; i++) {
            const petal = new THREE.Mesh(new THREE.CircleGeometry(0.045, 5), petalMat);
            const angle = Math.random() * Math.PI * 2;
            const rad = Math.random() * 6;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            petal.position.set(x, -0.5, z);
            petal.rotation.x = -Math.PI / 2;
            petal.rotation.z = Math.random() * Math.PI;
            petal.scale.set(1, 0.6, 1);
            scene.add(petal);
        }
        
        // --- Central romantic pedestal: heart-shaped platform with glowing name ---
        const heartShape = new THREE.Shape();
        heartShape.moveTo(0, 0.25);
        heartShape.bezierCurveTo(0, 0.25, 0.25, 0.4, 0.5, 0.25);
        heartShape.bezierCurveTo(0.75, 0.1, 0.5, -0.1, 0.25, -0.2);
        heartShape.bezierCurveTo(0, -0.1, -0.25, 0.1, -0.5, 0.25);
        heartShape.bezierCurveTo(-0.75, 0.4, 0, 0.25, 0, 0.25);
        const heartGeo = new THREE.ExtrudeGeometry(heartShape, { depth: 0.2, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 5 });
        heartGeo.computeVertexNormals();
        const heartBaseMat = new THREE.MeshStandardMaterial({ color: 0xff5588, emissive: 0x441122, emissiveIntensity: 0.35, metalness: 0.4 });
        const heartBase = new THREE.Mesh(heartGeo, heartBaseMat);
        heartBase.position.set(0, -0.45, 0);
        heartBase.scale.set(0.9, 0.9, 0.9);
        heartBase.rotation.z = Math.PI;
        heartBase.castShadow = true;
        scene.add(heartBase);
        
        // CSS2D glowing name "Arpita" above pedestal
        const nameDiv = document.createElement('div');
        nameDiv.textContent = '✨ Arpita ✨';
        nameDiv.style.color = '#FFE484';
        nameDiv.style.fontSize = '48px';
        nameDiv.style.fontWeight = 'bold';
        nameDiv.style.fontFamily = "'Dancing Script', 'Poppins', cursive";
        nameDiv.style.textShadow = '0 0 20px #FFAA33, 0 0 40px #FF5588';
        nameDiv.style.letterSpacing = '4px';
        nameDiv.style.background = 'linear-gradient(135deg, #FFE484, #FFB347)';
        nameDiv.style.webkitBackgroundClip = 'text';
        nameDiv.style.backgroundClip = 'text';
        nameDiv.style.color = 'transparent';
        const nameLabel = new CSS2DObject(nameDiv);
        nameLabel.position.set(0, 1.8, 0);
        scene.add(nameLabel);
        
        // --- Floating Roses (realistic romantic roses) ---
        function createRomanticRose(x, z, yOffset = 0, scaleVal = 1, colorVariant = 0xff6688) {
            const group = new THREE.Group();
            // stem
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x5a7a3a });
            const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, 0.65, 6), stemMat);
            stem.position.y = -0.2;
            group.add(stem);
            // leaves
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x6a8a4a });
            const leaf = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.04, 0.1), leafMat);
            leaf.position.set(-0.13, 0, 0);
            leaf.rotation.z = 0.6;
            group.add(leaf);
            const leaf2 = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.04, 0.1), leafMat);
            leaf2.position.set(0.13, 0, 0);
            leaf2.rotation.z = -0.6;
            group.add(leaf2);
            // rose petals
            const roseMat = new THREE.MeshStandardMaterial({ color: colorVariant, emissive: 0x331122, emissiveIntensity: 0.12 });
            const outerPetal = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), roseMat);
            outerPetal.position.y = 0.18;
            outerPetal.scale.set(1.1, 0.75, 1.1);
            group.add(outerPetal);
            const innerPetal = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), roseMat);
            innerPetal.position.y = 0.25;
            innerPetal.scale.set(0.9, 0.7, 0.9);
            group.add(innerPetal);
            const centerMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x552200 });
            const center = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), centerMat);
            center.position.y = 0.31;
            group.add(center);
            group.position.set(x, yOffset, z);
            group.scale.set(scaleVal, scaleVal, scaleVal);
            group.userData = { bobSpeed: 0.5 + Math.random(), offset: Math.random() * Math.PI * 2 };
            scene.add(group);
            return group;
        }
        
        const roses = [];
        // Heart-shaped rose arrangement (core romantic)
        const heartRosePoints = [];
        for (let t = 0; t <= Math.PI * 2; t += 0.09) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const z = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            heartRosePoints.push({ x: x * 0.12, z: z * 0.12 });
        }
        heartRosePoints.forEach((point, idx) => {
            if (idx % 2 === 0) {
                const roseColor = idx % 3 === 0 ? 0xff5588 : 0xff7788;
                const rose = createRomanticRose(point.x, point.z, 0, 0.55 + Math.random() * 0.2, roseColor);
                roses.push(rose);
            }
        });
        // add roses all around
        for (let i = 0; i < 80; i++) {
            const angle = Math.random() * Math.PI * 2;
            const rad = 2.2 + Math.random() * 4.2;
            const x = Math.cos(angle) * rad;
            const z = Math.sin(angle) * rad;
            const roseColor = Math.random() > 0.6 ? 0xff6688 : 0xff8888;
            const rose = createRomanticRose(x, z, 0, 0.5 + Math.random() * 0.3, roseColor);
            roses.push(rose);
        }
        
        // --- Floating Hearts (many, with trails) ---
        const heartMatFly = new THREE.MeshStandardMaterial({ color: 0xff5599, emissive: 0xff3366, emissiveIntensity: 0.45 });
        const floatingHearts = [];
        for (let i = 0; i < 65; i++) {
            const heartGeoSmall = new THREE.SphereGeometry(0.13, 16, 16);
            const heartObj = new THREE.Mesh(heartGeoSmall, heartMatFly);
            heartObj.scale.set(0.85, 1.05, 0.8);
            const radius = 2.0 + Math.random() * 3.5;
            const angle = Math.random() * Math.PI * 2;
            const y = 0.5 + Math.random() * 2.8;
            heartObj.position.set(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
            heartObj.castShadow = true;
            scene.add(heartObj);
            floatingHearts.push({ mesh: heartObj, radius, angle, yBase: y, speed: 0.003 + Math.random() * 0.008, floatSpeed: 0.003 });
        }
        
        // --- Particle Heart Nebula (thousands of glowing particles forming a large heart) ---
        const heartParticleCount = 4000;
        const heartParticleGeo = new THREE.BufferGeometry();
        const heartParticlePositions = new Float32Array(heartParticleCount * 3);
        for (let i = 0; i < heartParticleCount; i++) {
            let x, z;
            let inside = false;
            while (!inside) {
                x = (Math.random() - 0.5) * 3.8;
                z = (Math.random() - 0.5) * 3.8;
                // heart equation approximation
                const xx = x;
                const zz = z;
                const eq = Math.pow(xx * xx + (9/4) * zz * zz + 0.6 - 1, 3) - xx * xx * zz * zz * zz;
                if (eq < 0.05) inside = true;
            }
            const y = 0.3 + Math.random() * 1.6;
            heartParticlePositions[i*3] = x;
            heartParticlePositions[i*3+1] = y;
            heartParticlePositions[i*3+2] = z;
        }
        heartParticleGeo.setAttribute('position', new THREE.BufferAttribute(heartParticlePositions, 3));
        const heartParticleMat = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.028, transparent: true, blending: THREE.AdditiveBlending });
        const heartParticleSystem = new THREE.Points(heartParticleGeo, heartParticleMat);
        scene.add(heartParticleSystem);
        
        // --- Floating Romantic Messages (CSS2D) ---
        const messages = [
            "💖 I love you more than roses 💖",
            "🌙 You are my moonlight 🌙",
            "💕 Every heartbeat says Arpita 💕",
            "✨ Forever begins with you ✨",
            "🌸 My soul found its home in you 🌸"
        ];
        const floatingMessages = [];
        for (let i = 0; i < 8; i++) {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = messages[i % messages.length];
            msgDiv.style.color = '#FFB7D2';
            msgDiv.style.fontSize = '16px';
            msgDiv.style.fontWeight = '500';
            msgDiv.style.fontFamily = "'Dancing Script', cursive";
            msgDiv.style.textShadow = '0 0 8px #FF6699';
            msgDiv.style.backgroundColor = 'rgba(0,0,0,0.4)';
            msgDiv.style.padding = '4px 12px';
            msgDiv.style.borderRadius = '40px';
            msgDiv.style.backdropFilter = 'blur(4px)';
            msgDiv.style.border = '1px solid #ff88aa';
            const msgObj = new CSS2DObject(msgDiv);
            const angleRad = Math.random() * Math.PI * 2;
            const rad = 3.0 + Math.random() * 2.5;
            const yPos = 0.8 + Math.random() * 2.2;
            msgObj.position.set(Math.cos(angleRad) * rad, yPos, Math.sin(angleRad) * rad);
            scene.add(msgObj);
            floatingMessages.push({ obj: msgObj, angle: angleRad, radius: rad, yBase: yPos, speed: 0.002 + Math.random() * 0.005 });
        }
        
        // --- Romantic Dust (sparkling) ---
        const dustCount = 5000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPositions[i*3] = (Math.random() - 0.5) * 14;
            dustPositions[i*3+1] = Math.random() * 5;
            dustPositions[i*3+2] = (Math.random() - 0.5) * 12;
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xffaacc, size: 0.022, transparent: true, blending: THREE.AdditiveBlending });
        const dustParticles = new THREE.Points(dustGeo, dustMat);
        scene.add(dustParticles);
        
        // --- Starry background (romantic twinkling stars) ---
        const starCount = 2500;
        const starFieldGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 50;
        }
        starFieldGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMatRom = new THREE.PointsMaterial({ color: 0xffccdd, size: 0.07, transparent: true, opacity: 0.65 });
        const starField = new THREE.Points(starFieldGeo, starMatRom);
        scene.add(starField);
        
        // --- Floating Candle (visual) groups for ambience ---
        const candleMat = new THREE.MeshStandardMaterial({ color: 0xffaa77, emissive: 0xff6633, emissiveIntensity: 0.5 });
        for (let i = 0; i < 16; i++) {
            const candleGroup = new THREE.Group();
            const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.12, 0.35, 8), candleMat);
            candleBody.castShadow = true;
            const flame = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0xff4422, emissiveIntensity: 0.6 }));
            flame.position.y = 0.2;
            candleGroup.add(candleBody, flame);
            const angleC = Math.random() * Math.PI * 2;
            const radC = 2.5 + Math.random() * 3.2;
            candleGroup.position.set(Math.cos(angleC) * radC, -0.3, Math.sin(angleC) * radC);
            scene.add(candleGroup);
        }
        
        // --- Confetti with heart shapes (romantic burst) ---
        function launchRomanticConfetti() {
            if (typeof window.confetti === 'function') {
                window.confetti({ particleCount: 250, spread: 130, origin: { y: 0.6 }, startVelocity: 18, colors: ['#FF88AA', '#FF6699', '#FFB3C6', '#FFD1DC'] });
                setTimeout(() => {
                    window.confetti({ particleCount: 500, spread: 160, origin: { y: 0.5, x: 0.2 }, startVelocity: 20 });
                    window.confetti({ particleCount: 500, spread: 160, origin: { y: 0.5, x: 0.8 }, startVelocity: 20 });
                }, 200);
                setTimeout(() => {
                    window.confetti({ particleCount: 900, spread: 120, origin: { y: 0.3 }, startVelocity: 24, decay: 0.9 });
                }, 600);
            }
        }
        
        const confettiScript = document.createElement('script');
        confettiScript.src = 'https://cdn.jsdelivr.net/npm/canvas-confetti@1';
        confettiScript.onload = () => {
            launchRomanticConfetti();
            setInterval(() => {
                if (Math.random() > 0.85) {
                    window.confetti({ particleCount: 100, spread: 80, origin: { y: 0.8, x: Math.random() }, startVelocity: 14, colors: ['#FF99BB', '#FF77AA'] });
                }
            }, 4000);
        };
        document.head.appendChild(confettiScript);
        
        // --- Animation Loop: roses bob, hearts float, messages orbit, lights dance ---
        let time = 0;
        
        function animate() {
            time += 0.016;
            
            // Bobbing roses
            roses.forEach((rose, idx) => {
                const yOff = Math.sin(time * 1.1 + idx * 0.15) * 0.012;
                rose.position.y = yOff;
                rose.rotation.z = Math.sin(time * 0.9 + idx) * 0.015;
            });
            
            // Floating hearts: circular motion + vertical
            floatingHearts.forEach(heart => {
                heart.angle += heart.speed;
                heart.mesh.position.x = Math.cos(heart.angle) * heart.radius;
                heart.mesh.position.z = Math.sin(heart.angle) * heart.radius;
                heart.mesh.position.y = heart.yBase + Math.sin(time * 1.3 + heart.angle) * 0.09;
                heart.mesh.rotation.y += 0.02;
                heart.mesh.rotation.x = Math.sin(time * 1.2) * 0.3;
            });
            
            // Rotating heart particle nebula
            heartParticleSystem.rotation.y = time * 0.08;
            heartParticleSystem.rotation.x = Math.sin(time * 0.25) * 0.1;
            
            // Dust particles gentle rotation
            dustParticles.rotation.y = time * 0.006;
            starField.rotation.y = time * 0.003;
            
            // Floating romantic messages orbiting
            floatingMessages.forEach(msg => {
                msg.angle += msg.speed;
                msg.obj.position.x = Math.cos(msg.angle) * msg.radius;
                msg.obj.position.z = Math.sin(msg.angle) * msg.radius;
                msg.obj.position.y = msg.yBase + Math.sin(time * 1.1 + msg.angle) * 0.08;
            });
            
            // Candle lights movement
            candleLights.forEach((light, idx) => {
                const angle = time * 0.65 + idx;
                const rad = 2.7;
                light.position.x = Math.cos(angle) * rad;
                light.position.z = Math.sin(angle) * rad;
                light.position.y = 0.9 + Math.sin(angle * 1.6) * 1.2;
                light.intensity = 0.45 + Math.sin(time * 2 + idx) * 0.15;
            });
            
            // Pulsing rim light
            rimLove.intensity = 0.7 + Math.sin(time * 1.4) * 0.25;
            candleFill.intensity = 0.6 + Math.sin(time * 1.1) * 0.15;
            
            // Name label gentle floating
            nameLabel.position.y = 1.8 + Math.sin(time * 1.3) * 0.05;
            
            // Update controls and render
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // resize handler
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("%c💖 HAPPY BIRTHDAY MY LOVE, ARPITA! 💖 You are my forever romance, my everything 💕", "color: #FF88AA; font-size: 16px; font-weight: bold; text-shadow: 0 0 8px #FF3366;");
    </script>
</body>
</html>
